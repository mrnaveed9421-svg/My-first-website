<style>
:root{
  --ink:#0F172A; --ink-2:#1B2436; --ink-3:#0A101E;
  --paper:#FFFFFF; --stone:#F4F2EC;
  --gold:#D4AF37; --gold-deep:#A9821F; --gold-pale:#EAD9A0; --gold-bright:#E8CB6E;
  --slate:#5B6472;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important;}}
body{margin:0;font-family:'Inter',sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

button{font-family:inherit;border:none;background:none;cursor:pointer;}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px;}

a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px;}

/* Reusable gold gradients (no external assets) */

.g-2{background:linear-gradient(135deg,#D4AF37 0%,#A9821F 100%);}
.g-3{background:linear-gradient(135deg,#2A3654 0%,#141C2E 100%);}

/* ---------- Buttons ---------- */

/* ---------- Logo mark ---------- */
.logo-mark{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:block;}
